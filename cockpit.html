<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Natura Tif — Cockpit</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
:root {
  --primary: #5B5723;
  --primary-light: #F5F0E1;
  --green: #7A9B2E;
  --green-light: #EAF0D5;
  --red: #B94A3E;
  --amber: #B8860B;
  --gray: #888;
  --gray-light: #BBB;
  --bg: #FAF8F2;
  --card: #FFFFFF;
  --text: #2D2A1E;
  --border: #E8E2D0;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* Login */
.login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
.login-card { background: var(--card); border-radius: 20px; padding: 40px 30px; max-width: 380px; width: 100%; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
.login-card h1 { font-family: 'Playfair Display', serif; color: var(--primary); font-size: 28px; margin-bottom: 6px; }
.login-card p { color: var(--gray); font-size: 14px; margin-bottom: 30px; }
.login-card input { width: 100%; padding: 14px 16px; border: 2px solid var(--border); border-radius: 12px; font-size: 16px; font-family: 'Inter', sans-serif; text-align: center; letter-spacing: 4px; outline: none; }
.login-card input:focus { border-color: var(--primary); }
.login-card button { width: 100%; margin-top: 16px; padding: 14px; background: var(--primary); color: #fff; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; }
.login-error { color: var(--red); font-size: 13px; margin-top: 12px; min-height: 18px; }

/* App */
.app { display: none; max-width: 1100px; margin: 0 auto; padding: 20px 16px 60px; }
.top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; gap: 10px; flex-wrap: wrap; }
.top-bar .last-sync { font-size: 12px; color: var(--gray); }
.top-bar .logout { background: none; border: 1px solid var(--border); border-radius: 8px; padding: 6px 12px; font-size: 12px; color: var(--gray); cursor: pointer; font-family: 'Inter', sans-serif; }
.app-header { text-align: center; padding: 8px 0 16px; }
.app-header h1 { font-family: 'Playfair Display', serif; color: var(--primary); font-size: 26px; }
.app-header p { color: var(--gray); font-size: 13px; margin-top: 2px; }

/* Main tabs (Vue / Transactions / Analytics) */
.main-tabs { display: flex; gap: 6px; background: var(--card); border-radius: 14px; padding: 6px; border: 1px solid var(--border); margin-bottom: 18px; }
.main-tab { flex: 1; padding: 12px 14px; text-align: center; font-size: 14px; font-weight: 600; cursor: pointer; background: transparent; border: none; color: var(--gray); font-family: 'Inter', sans-serif; transition: all 0.2s; border-radius: 10px; }
.main-tab.active { background: var(--primary); color: #fff; }
.main-tab:hover:not(.active) { background: var(--primary-light); color: var(--primary); }

/* Period tabs */
.period-tabs { display: flex; gap: 0; background: var(--card); border-radius: 12px; overflow: hidden; border: 2px solid var(--border); margin-bottom: 14px; }
.period-tab { flex: 1; padding: 11px 8px; text-align: center; font-size: 13px; font-weight: 600; cursor: pointer; background: transparent; border: none; color: var(--gray); font-family: 'Inter', sans-serif; }
.period-tab.active { background: var(--primary); color: #fff; }

/* Period nav */
.nav-row { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 20px; }
.nav-btn { width: 36px; height: 36px; border-radius: 50%; border: 2px solid var(--border); background: var(--card); font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--primary); }
.nav-label { font-size: 15px; font-weight: 600; color: var(--primary); min-width: 200px; text-align: center; }

/* Sections */
.section { margin-bottom: 24px; }
.section-title { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--gray); margin-bottom: 10px; }

/* KPI grid */
.kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
.kpi { background: var(--card); border-radius: 12px; padding: 14px; text-align: center; border: 1px solid var(--border); }
.kpi-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: var(--gray); margin-bottom: 4px; }
.kpi-value { font-size: 22px; font-weight: 700; color: var(--primary); }
.kpi-sub { font-size: 11px; color: var(--gray); margin-top: 2px; }
.kpi-sub.up { color: var(--green); }
.kpi-sub.down { color: var(--red); }
.kpi.highlight { background: var(--primary); border-color: var(--primary); }
.kpi.highlight .kpi-label { color: rgba(255,255,255,0.7); }
.kpi.highlight .kpi-value { color: #fff; }
.kpi.highlight .kpi-sub { color: rgba(255,255,255,0.6); }
.kpi-grid-3 { grid-template-columns: repeat(3, 1fr); }
.kpi-grid-2 { grid-template-columns: repeat(2, 1fr); }

/* Status pills */
.status-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 10px; }
.status-pill { background: var(--card); border-radius: 12px; padding: 14px 16px; border: 1px solid var(--border); display: flex; gap: 10px; align-items: center; }
.status-pill.ok { border-left: 4px solid var(--green); }
.status-pill.warn { border-left: 4px solid var(--amber); background: #FFFBEB; }
.status-pill.bad { border-left: 4px solid var(--red); background: #FEF2F2; }
.status-pill .icon { font-size: 18px; line-height: 1; }
.status-pill .body { flex: 1; }
.status-pill .label { font-size: 12px; color: var(--gray); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
.status-pill .value { font-size: 14px; font-weight: 600; color: var(--text); }

/* Charts */
.chart-row { display: grid; grid-template-columns: 2fr 1fr; gap: 14px; }
.chart-card { background: var(--card); border-radius: 14px; padding: 16px; border: 1px solid var(--border); }
.chart-card h3 { font-size: 13px; font-weight: 700; color: var(--primary); margin-bottom: 10px; }
.chart-card canvas { width: 100% !important; max-height: 260px; }

/* Table */
.table-card { background: var(--card); border-radius: 14px; border: 1px solid var(--border); overflow: hidden; }
.table-card table { width: 100%; border-collapse: collapse; font-size: 12px; }
.table-card th { background: var(--primary-light); color: var(--primary); font-weight: 700; text-transform: uppercase; font-size: 10px; letter-spacing: 0.5px; padding: 10px 8px; text-align: left; }
.table-card td { padding: 8px; border-top: 1px solid var(--border); }
.table-card tr:hover td { background: #FDFCF8; }
.badge { display: inline-block; padding: 2px 7px; border-radius: 5px; font-size: 10px; font-weight: 600; }
.badge.esp { background: #FEF3C7; color: #92400E; }
.badge.cb { background: #DBEAFE; color: #1E40AF; }
.badge.cheque { background: #E0E7FF; color: #3730A3; }
.no-data { text-align: center; padding: 40px 20px; color: var(--gray); font-size: 14px; }

/* Actions */
.actions { display: flex; gap: 10px; flex-wrap: wrap; }
.btn { padding: 10px 20px; border: none; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; display: inline-flex; align-items: center; gap: 6px; }
.btn-green { background: var(--green); color: white; }
.btn-primary { background: var(--primary); color: white; }
.btn-outline { background: var(--card); color: var(--primary); border: 1px solid var(--border); }
.btn:hover { opacity: 0.9; }

/* Loading */
.loading { text-align: center; padding: 60px; color: var(--gray); }
.spinner { display: inline-block; width: 28px; height: 28px; border: 3px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

@media (max-width: 700px) {
  .kpi-grid { grid-template-columns: repeat(2, 1fr); }
  .kpi-grid-3 { grid-template-columns: repeat(2, 1fr); }
  .chart-row { grid-template-columns: 1fr; }
  .main-tab { font-size: 12px; padding: 10px 8px; }
  .app-header h1 { font-size: 22px; }
}
</style>
</head>

<!-- LOGIN -->
<div class="login-screen" id="login-screen">
  <div class="login-card">
    <h1>Natura Tif</h1>
    <p>Cockpit de pilotage</p>
    <input type="password" id="pin-input" placeholder="Code PIN" maxlength="6" inputmode="numeric" autofocus>
    <button onclick="tryLogin()">ACCÉDER</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- APP -->
<div class="app" id="app">
  <div class="top-bar">
    <div class="last-sync" id="last-sync">Connexion…</div>
    <button class="logout" onclick="logout()">Déconnexion</button>
  </div>
  <div class="app-header">
    <h1>Natura Tif — Cockpit</h1>
    <p>Pilotage opérationnel</p>
  </div>

  <div class="main-tabs">
    <button class="main-tab active" data-view="vue" onclick="setView('vue')">Vue d'ensemble</button>
    <button class="main-tab" data-view="transactions" onclick="setView('transactions')">Transactions</button>
    <button class="main-tab" data-view="analytics" onclick="setView('analytics')">Analytics</button>

  <div id="content">
    <div class="loading"><div class="spinner"></div><br>Chargement…</div>
  </div>
</div>

<script>
// ==================== CONFIG ====================
const SUPABASE_URL = 'https://rgwsqufbdimryxqefvhx.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJnd3NxdWZiZGltcnl4cWVmdmh4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NTI4OTQsImV4cCI6MjA5MDUyODg5NH0.VNIY3iq3WZz-SVveQdMMqNth2ZmBP7aoJJ3PhfsmN-0';
const PIN_CODE = '1234';

const JOURS = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
const MOIS = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
const MOIS_SHORT = ['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc'];
const CAT_LABELS = { femme: 'Femme', homme: 'Homme', enfant: 'Enfant' };
const PAY_LABELS = { especes: 'Espèces', cb: 'CB', cheque: 'Chèque' };
const COLORS = { femme: '#8B6914', homme: '#5B5723', enfant: '#A8956A', produit: '#D97706', especes: '#7A9B2E', cb: '#4A7AB5', cheque: '#7C6BAF' };

const IS_TEST = (location.hostname !== 'oxen19430.github.io');
const TX_TABLE = IS_TEST ? 'transactions_test' : 'transactions';

let sb = null;
let allTx = [];
let currentView = 'vue';
let currentPeriod = 'mois';
let currentDate = new Date();
let chartBar = null, chartPie = null;

// ==================== LOGIN ====================
document.getElementById('pin-input').addEventListener('keydown', e => { if (e.key === 'Enter') tryLogin(); });

function tryLogin() {
  const pin = document.getElementById('pin-input').value;
  if (pin === PIN_CODE) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    sessionStorage.setItem('nt_cockpit', '1');
    init();
  } else {
    document.getElementById('login-error').textContent = 'Code incorrect';
    document.getElementById('pin-input').value = '';
  }
}

function logout() {
  sessionStorage.removeItem('nt_cockpit');
  location.reload();
}

if (sessionStorage.getItem('nt_cockpit')) {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  init();
}

// ==================== INIT ====================
// Timestamp du dernier pull réussi — utilisé par autoRefresh() pour l'anti-rebond.
let _lastRefresh = 0;

async function init() {
  sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  try { await sb.auth.signInAnonymously(); } catch(e) { console.warn('Auth anonyme:', e); }
  await loadData();
  render();
}

async function loadData() {
  try {
    const { data, error } = await sb.from(TX_TABLE).select('*').order('date', { ascending: true });
    if (error) throw error;
    allTx = (data || []).map(t => ({ ...t, montant: parseFloat(t.montant) || 0 }));
    document.getElementById('last-sync').textContent = 'Données à jour · ' + new Date().toLocaleString('fr-FR');
    _lastRefresh = Date.now();
  } catch(e) {
    document.getElementById('content').innerHTML = '<div class="no-data">Erreur de connexion à Supabase.<br><small>' + e.message + '</small></div>';
  }
}

// ==================== AUTO-REFRESH ====================
// Re-pull silencieux quand l'onglet redevient visible ou que le réseau revient.
// Anti-rebond 10 s pour éviter de spammer Supabase.
async function autoRefresh() {
  if (!sb || !sessionStorage.getItem('nt_cockpit')) return;
  if (!navigator.onLine) return;
  if (Date.now() - _lastRefresh < 10000) return;
  await loadData();
  render();
}
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') autoRefresh();
});
window.addEventListener('online', autoRefresh);

// ==================== VIEW SWITCHING ====================
function setView(v) {
  currentView = v;
  document.querySelectorAll('.main-tab').forEach(t => t.classList.toggle('active', t.dataset.view === v));
  document.getElementById('period-controls').style.display = (v === 'vue' || v === 'securite' || v === 'backup' || v === 'deploy') ? 'none' : 'block';
  render();
}

function setPeriod(p) {
  currentPeriod = p;
  currentDate = new Date();
  document.querySelectorAll('.period-tab').forEach(t => t.classList.toggle('active', t.dataset.period === p));
  render();
}

function navigatePeriod(dir) {
  const d = currentDate;
  if (currentPeriod === 'jour') d.setDate(d.getDate() + dir);
  else if (currentPeriod === 'semaine') d.setDate(d.getDate() + dir * 7);
  else if (currentPeriod === 'mois') d.setMonth(d.getMonth() + dir);
  else d.setFullYear(d.getFullYear() + dir);
  render();
}

// ==================== HELPERS ====================
function fmt(d) { return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0'); }
function money(n) { return n.toFixed(2).replace('.', ',') + ' €'; }
function pctOf(v, total) { return total > 0 ? (v / total * 100).toFixed(0) + '%' : ''; }
function isReduction(t) { return (t.montant < 0) || /r[eé]duction|remise|avoir/i.test(t.prestation || ''); }

function getRange() {
  const d = new Date(currentDate);
  let start, end, label, prevStart, prevEnd;
  if (currentPeriod === 'jour') {
    start = end = fmt(d);
    label = JOURS[d.getDay()] + ' ' + d.getDate() + ' ' + MOIS[d.getMonth()] + ' ' + d.getFullYear();
    const pd = new Date(d); pd.setDate(pd.getDate() - 1);
    prevStart = prevEnd = fmt(pd);
  } else if (currentPeriod === 'semaine') {
    const day = d.getDay(), diff = d.getDate() - day + (day === 0 ? -6 : 1);
    const mon = new Date(d); mon.setDate(diff);
    const sun = new Date(mon); sun.setDate(mon.getDate() + 6);
    start = fmt(mon); end = fmt(sun);
    label = mon.getDate() + ' ' + MOIS_SHORT[mon.getMonth()] + ' — ' + sun.getDate() + ' ' + MOIS_SHORT[sun.getMonth()] + ' ' + sun.getFullYear();
    const pm = new Date(mon); pm.setDate(pm.getDate() - 7);
    const ps = new Date(pm); ps.setDate(pm.getDate() + 6);
    prevStart = fmt(pm); prevEnd = fmt(ps);
  } else if (currentPeriod === 'mois') {
    const first = new Date(d.getFullYear(), d.getMonth(), 1);
    const last = new Date(d.getFullYear(), d.getMonth() + 1, 0);
    start = fmt(first); end = fmt(last);
    label = MOIS[d.getMonth()] + ' ' + d.getFullYear();
    const pf = new Date(d.getFullYear(), d.getMonth() - 1, 1);
    const pl = new Date(d.getFullYear(), d.getMonth(), 0);
    prevStart = fmt(pf); prevEnd = fmt(pl);
  } else {
    start = d.getFullYear() + '-01-01'; end = d.getFullYear() + '-12-31';
    label = 'Année ' + d.getFullYear();
    prevStart = (d.getFullYear()-1) + '-01-01'; prevEnd = (d.getFullYear()-1) + '-12-31';
  }
  return { start, end, label, prevStart, prevEnd };
}

function compareSub(curr, prev) {
  if (prev === 0 && curr === 0) return '';
  if (prev === 0) return '+100%';
  const diff = ((curr - prev) / prev * 100).toFixed(0);
  return (diff >= 0 ? '+' : '') + diff + '% vs préc.';
}

function kpi(label, value, sub, highlight) {
  const subClass = sub && sub.startsWith('+') ? 'up' : sub && sub.startsWith('-') ? 'down' : '';
  return `<div class="kpi${highlight ? ' highlight' : ''}"><div class="kpi-label">${label}</div><div class="kpi-value">${value}</div>${sub ? '<div class="kpi-sub ' + subClass + '">' + sub + '</div>' : ''}</div>`;
}

// ==================== ROUTER ====================
function render() {
  const { start, end, label } = getRange();
  document.getElementById('nav-label').textContent = label;
  if (currentView === 'vue') return renderVue();
  if (currentView === 'transactions') return renderTransactions();
  if (currentView === 'analytics') return renderAnalytics();
  if (currentView === 'securite') return renderSecurity();
  if (currentView === 'backup') return renderBackup();
  if (currentView === 'deploy') return renderDeploy();
}

// ==================== VUE D'ENSEMBLE ====================
function renderVue() {
  const today = fmt(new Date());
  const now = new Date();
  const monthStart = fmt(new Date(now.getFullYear(), now.getMonth(), 1));
  const monthEnd = fmt(new Date(now.getFullYear(), now.getMonth() + 1, 0));

  const todayTx = allTx.filter(t => t.date === today);
  const monthTx = allTx.filter(t => t.date >= monthStart && t.date <= monthEnd);

  const todayCA = todayTx.reduce((s, t) => s + t.montant, 0);
  const monthCA = monthTx.reduce((s, t) => s + t.montant, 0);
  const todaySessions = new Set(todayTx.map(t => t.session_id || t.id)).size;
  const monthSessions = new Set(monthTx.map(t => t.session_id || t.id)).size;
  const monthAvg = monthSessions > 0 ? monthCA / monthSessions : 0;

  // État de l'app
  const lastSyncTx = allTx.length ? allTx.reduce((m, t) => (t.synced_at && t.synced_at > m) ? t.synced_at : m, '') : '';
  const lastSyncDate = lastSyncTx ? new Date(lastSyncTx) : null;
  const hoursSinceSync = lastSyncDate ? (Date.now() - lastSyncDate.getTime()) / 3600000 : null;
  let syncStatus = 'ok', syncLabel = 'Sync OK', syncValue = 'à l\'instant';
  if (hoursSinceSync == null) {
    syncStatus = 'warn'; syncValue = 'aucune sync';
  } else if (hoursSinceSync < 1) {
    syncValue = Math.round(hoursSinceSync * 60) + ' min';
  } else if (hoursSinceSync < 48) {
    syncValue = hoursSinceSync.toFixed(1) + ' h';
    if (hoursSinceSync > 24) syncStatus = 'warn';
  } else {
    syncStatus = 'bad'; syncValue = (hoursSinceSync / 24).toFixed(1) + ' j';
  }

  const totalRows = allTx.length;
  const env = IS_TEST ? 'TEST · transactions_test' : 'PROD · transactions';

  let html = '';

  // KPIs jour
  html += '<div class="section"><div class="section-title">Aujourd\'hui</div><div class="kpi-grid kpi-grid-3">';
  html += kpi('CA du jour', money(todayCA), todayTx.length ? todayTx.length + ' transaction' + (todayTx.length>1?'s':'') : 'aucune transaction', true);
  html += kpi('Encaissements', todaySessions, '');
  html += kpi('Panier moyen', todaySessions > 0 ? money(todayCA / todaySessions) : '—', '');
  html += '</div></div>';

  // KPIs mois
  html += '<div class="section"><div class="section-title">Mois en cours · ' + MOIS[now.getMonth()] + ' ' + now.getFullYear() + '</div><div class="kpi-grid">';
  html += kpi('CA du mois', money(monthCA), '', false);
  html += kpi('Encaissements', monthSessions, '');
  html += kpi('Panier moyen', money(monthAvg), '');
  html += kpi('Jours actifs', new Set(monthTx.map(t => t.date)).size, 'sur ' + new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate());
  html += '</div></div>';

  // État système
  html += '<div class="section"><div class="section-title">État du système</div><div class="status-row">';
  html += '<div class="status-pill ' + syncStatus + '"><div class="icon">' + (syncStatus==='ok'?'✓':syncStatus==='warn'?'!':'⚠') + '</div><div class="body"><div class="label">Dernière sync</div><div class="value">il y a ' + syncValue + '</div></div></div>';

// ==================== TRANSACTIONS ====================
function renderTransactions() {
  const { start, end } = getRange();
  const txs = allTx.filter(t => t.date >= start && t.date <= end);

  // Stats
  const totalCA = txs.reduce((s, t) => s + t.montant, 0);
  const nbEncaiss = new Set(txs.map(t => t.session_id || t.id)).size;
  const byCat = { femme: 0, homme: 0, enfant: 0 };
  const byPay = { especes: 0, cb: 0, cheque: 0 };
  let totalProduits = 0;
  txs.forEach(t => {
    if (t.type === 'produit') totalProduits += t.montant;
    else if (byCat[t.categorie] !== undefined) byCat[t.categorie] += t.montant;
    if (byPay[t.paiement] !== undefined) byPay[t.paiement] += t.montant;
  });

  let html = '';

  html += '<div class="section"><div class="kpi-grid kpi-grid-3">';
  html += kpi('Chiffre d\'affaires', money(totalCA), nbEncaiss + ' encaissement' + (nbEncaiss>1?'s':''), true);
  html += kpi('Panier moyen', nbEncaiss > 0 ? money(totalCA / nbEncaiss) : '—', '');
  html += kpi('Produits', money(totalProduits), pctOf(totalProduits, totalCA));
  html += '</div></div>';

  // Réductions sur la période
  const reductions = txs.filter(t => isReduction(t));
  const reductionsTotal = Math.abs(reductions.reduce((s, t) => s + t.montant, 0));
  const caBrut = totalCA + reductionsTotal;

  html += '<div class="section"><div class="section-title">Détail par catégorie</div><div class="kpi-grid">';
  html += kpi('Femme', money(byCat.femme), pctOf(byCat.femme, totalCA));
  html += kpi('Homme', money(byCat.homme), pctOf(byCat.homme, totalCA));
  html += kpi('Enfant', money(byCat.enfant), pctOf(byCat.enfant, totalCA));
  html += kpi('Produits', money(totalProduits), pctOf(totalProduits, totalCA));
  html += '</div></div>';

  if (reductions.length > 0) {
    html += '<div class="section"><div class="section-title">Réductions appliquées</div><div class="kpi-grid kpi-grid-3">';
    html += kpi('Nombre', reductions.length, '');
    html += kpi('Total accordé', money(reductionsTotal), reductionsTotal > 0 ? pctOf(reductionsTotal, caBrut) + ' du CA brut' : '');
    html += kpi('Moy. par réduction', money(reductionsTotal / reductions.length), '');
    html += '</div></div>';
  }

  html += '<div class="section"><div class="section-title">Modes de paiement</div><div class="kpi-grid kpi-grid-3">';
  html += kpi('Espèces', money(byPay.especes), pctOf(byPay.especes, totalCA));
  html += kpi('CB', money(byPay.cb), pctOf(byPay.cb, totalCA));
  html += kpi('Chèque', money(byPay.cheque), pctOf(byPay.cheque, totalCA));
  html += '</div></div>';

  // Table
  html += '<div class="section"><div class="section-title">Transactions (' + txs.length + ')</div>';
  if (txs.length > 0) {
    html += buildTable(txs);
  } else {
    html += '<div class="no-data">Aucune transaction sur cette période</div>';
  }
  html += '</div>';

  // Actions
  html += '<div class="actions" style="margin-top:8px;">';
  html += '<button class="btn btn-outline" onclick="loadData().then(render)">↻ Actualiser</button>';
  html += '</div>';

  document.getElementById('content').innerHTML = html;
}

// ==================== ANALYTICS ====================
function renderAnalytics() {
  const { start, end, prevStart, prevEnd } = getRange();
  const txs = allTx.filter(t => t.date >= start && t.date <= end);
  const prevTxs = allTx.filter(t => t.date >= prevStart && t.date <= prevEnd);

  const ca = txs.reduce((s, t) => s + t.montant, 0);
  const prevCA = prevTxs.reduce((s, t) => s + t.montant, 0);
  const sessions = new Set(txs.map(t => t.session_id || t.id)).size;
  const prevSessions = new Set(prevTxs.map(t => t.session_id || t.id)).size;
  const avg = sessions > 0 ? ca / sessions : 0;
  const prevAvg = prevSessions > 0 ? prevCA / prevSessions : 0;
  const prodTotal = txs.filter(t => t.type === 'produit').reduce((s, t) => s + t.montant, 0);

  let html = '';

  // KPIs avec comparaison
  html += '<div class="section"><div class="section-title">Indicateurs (vs période précédente)</div><div class="kpi-grid">';
  html += kpi('Chiffre d\'affaires', money(ca), compareSub(ca, prevCA), true);
  html += kpi('Encaissements', sessions, compareSub(sessions, prevSessions));
  html += kpi('Panier moyen', money(avg), compareSub(avg, prevAvg));
  html += kpi('Produits', money(prodTotal), '');
  html += '</div></div>';

  // Réductions appliquées
  const reductions = txs.filter(t => isReduction(t));
  const reductionsTotal = Math.abs(reductions.reduce((s, t) => s + t.montant, 0));
  const prevReductions = prevTxs.filter(t => isReduction(t));
  const prevReductionsTotal = Math.abs(prevReductions.reduce((s, t) => s + t.montant, 0));
  const caBrut = ca + reductionsTotal;

  if (reductions.length > 0 || prevReductions.length > 0) {
    html += '<div class="section"><div class="section-title">Réductions accordées (vs période précédente)</div><div class="kpi-grid">';
    html += kpi('Nombre', reductions.length, compareSub(reductions.length, prevReductions.length));
    html += kpi('Total accordé', money(reductionsTotal), compareSub(reductionsTotal, prevReductionsTotal));
    html += kpi('% du CA brut', caBrut > 0 ? (reductionsTotal / caBrut * 100).toFixed(1) + '%' : '0%', '');
    html += kpi('Moy. par réduction', reductions.length > 0 ? money(reductionsTotal / reductions.length) : '—', '');
    html += '</div></div>';
  }

  // Charts
  html += '<div class="section"><div class="section-title">Visualisation</div><div class="chart-row">';
  html += '<div class="chart-card"><h3>Évolution du CA</h3><canvas id="chart-bar"></canvas></div>';
  html += '<div class="chart-card"><h3>Répartition</h3><canvas id="chart-pie"></canvas></div>';
  html += '</div></div>';

  // Table
  html += '<div class="section"><div class="section-title">Transactions (' + txs.length + ')</div>';
  if (txs.length > 0) html += buildTable(txs);
  else html += '<div class="no-data">Aucune transaction</div>';
  html += '</div>';

  // Actions
  html += '<div class="section"><div class="section-title">Exporter</div><div class="actions">';
  html += '<button class="btn btn-green" onclick="downloadCSV()">⬇ CSV de la période</button>';
  html += '<button class="btn btn-outline" onclick="downloadCSVAll()">⬇ CSV complet</button>';
  html += '<button class="btn btn-outline" onclick="loadData().then(render)">↻ Actualiser</button>';
  html += '</div></div>';

  document.getElementById('content').innerHTML = html;
  buildCharts(txs, start, end);
}

// ==================== SECURITE ====================
async function renderSecurity() {
  const el = document.getElementById('content');
  el.innerHTML = '<div class="loading"><div class="spinner"></div><br>Vérifications de sécurité…</div>';

  // 1. Test isolation RLS (live)
  const cfg = { url: SUPABASE_URL, key: SUPABASE_KEY };
  const pirate = window.supabase.createClient(cfg.url, cfg.key, {
    auth: { persistSession: false, autoRefreshToken: false, storage: { getItem:()=>null, setItem:()=>{}, removeItem:()=>{} } }
  });
  let rlsTest;
  try {
    const sel = await pirate.from(TX_TABLE).select('id').limit(5);
    const ins = await pirate.from(TX_TABLE).insert({
      id: '__SEC_TEST__' + Date.now(), date: '2026-04-27', montant: 0.01,
      prestation: '__test_securite__', paiement: 'cb', type: 'prestation'
    });
    rlsTest = {
      selectCount: sel.data ? sel.data.length : null,
      selectError: sel.error ? sel.error.message : null,
      insertBlocked: !!ins.error,
      insertError: ins.error ? ins.error.message : null,
      verdict: (!sel.data || sel.data.length === 0) && !!ins.error ? 'ok' : 'bad'
    };
  } catch(e) {
    rlsTest = { error: e.message, verdict: 'unknown' };
  }
  // Au cas où l'INSERT serait passé (faille) : nettoyer
  try { await pirate.from(TX_TABLE).delete().like('id', '__SEC_TEST__%'); } catch(e) {}

  // 2. Intégrité des données comptables
  const totalRows = allTx.length;
  const distinctIds = new Set(allTx.map(t => t.id)).size;
  const nullMontant = allTx.filter(t => t.montant == null || isNaN(t.montant)).length;
  const nullDate = allTx.filter(t => !t.date).length;
  const nullPaiement = allTx.filter(t => !t.paiement).length;
  const nullPrestation = allTx.filter(t => !t.prestation).length;
  const negMontant = allTx.filter(t => t.montant < 0).length;
  const duplicateIds = totalRows - distinctIds;

  const findings = [];
  if (duplicateIds > 0) findings.push({ level: 'bad', msg: duplicateIds + ' doublons d\'ID détectés' });
  if (nullDate > 0) findings.push({ level: 'bad', msg: nullDate + ' ligne(s) sans date' });
  if (nullMontant > 0) findings.push({ level: 'bad', msg: nullMontant + ' ligne(s) sans montant' });
  if (nullPaiement > 0) findings.push({ level: 'warn', msg: nullPaiement + ' ligne(s) sans mode de paiement' });
  if (nullPrestation > 0) findings.push({ level: 'warn', msg: nullPrestation + ' ligne(s) sans libellé prestation' });
  const reductionsList = allTx.filter(t => isReduction(t));
  const negSuspect = allTx.filter(t => t.montant < 0 && !isReduction(t)).length;
  if (negSuspect > 0) findings.push({ level: 'warn', msg: negSuspect + ' montant(s) négatif(s) suspect(s) (hors réductions identifiées)' });

  // 3. Récupérabilité
  const sortedSync = allTx.filter(t => t.synced_at).map(t => t.synced_at).sort();
  const firstSync = sortedSync[0];
  const lastSync = sortedSync[sortedSync.length - 1];
  const hoursSinceLast = lastSync ? (Date.now() - new Date(lastSync).getTime()) / 3600000 : null;
  const daysSinceFirst = firstSync ? (Date.now() - new Date(firstSync).getTime()) / 86400000 : null;

  // 4. Verdict global
  let verdict = 'ok';
  if (rlsTest.verdict === 'bad') verdict = 'bad';
  else if (findings.some(f => f.level === 'bad')) verdict = 'bad';
  else if (findings.some(f => f.level === 'warn')) verdict = 'warn';
  else if (rlsTest.verdict === 'unknown') verdict = 'warn';

  // === Render ===
  let html = '';

  // Verdict
  const verdictLabel = verdict === 'ok' ? 'Sécurité OK' : verdict === 'warn' ? 'Avertissements' : 'Faille détectée';
  const verdictIcon = verdict === 'ok' ? '✓' : verdict === 'warn' ? '!' : '⚠';
  html += '<div class="section"><div class="status-pill ' + verdict + '"><div class="icon" style="font-size:24px">' + verdictIcon + '</div><div class="body"><div class="label">Verdict global</div><div class="value" style="font-size:18px">' + verdictLabel + '</div></div></div></div>';

  // Test RLS isolation
  html += '<div class="section"><div class="section-title">Test d\'isolation RLS (live)</div><div class="status-row">';
  if (rlsTest.error) {
    html += '<div class="status-pill warn"><div class="icon">?</div><div class="body"><div class="label">Test impossible</div><div class="value">' + rlsTest.error + '</div></div></div>';
  } else {
    const selOk = (rlsTest.selectCount === 0 || rlsTest.selectCount === null);
    html += '<div class="status-pill ' + (selOk ? 'ok' : 'bad') + '"><div class="icon">' + (selOk ? '✓' : '⚠') + '</div><div class="body"><div class="label">SELECT sans auth</div><div class="value">' + (selOk ? 'bloqué (RLS filtre)' : rlsTest.selectCount + ' lignes lues — FAILLE') + '</div></div></div>';
    html += '<div class="status-pill ' + (rlsTest.insertBlocked ? 'ok' : 'bad') + '"><div class="icon">' + (rlsTest.insertBlocked ? '✓' : '⚠') + '</div><div class="body"><div class="label">INSERT sans auth</div><div class="value">' + (rlsTest.insertBlocked ? 'bloqué par RLS' : 'PASSÉ — FAILLE') + '</div></div></div>';
  }
  html += '<div class="status-pill ok"><div class="icon">🔒</div><div class="body"><div class="label">Politique active</div><div class="value">auth.uid() IS NOT NULL</div></div></div>';
  html += '</div>';
  html += '<p style="font-size:12px;color:var(--gray);margin-top:8px;">Ce test crée un client Supabase isolé (sans session), tente une lecture et une écriture, et vérifie que la base les rejette. Si l\'un des deux passe, la sécurité est compromise.</p>';
  html += '</div>';

  // Intégrité
  html += '<div class="section"><div class="section-title">Intégrité des données comptables</div>';
  if (findings.length === 0) {
    html += '<div class="status-pill ok"><div class="icon">✓</div><div class="body"><div class="label">Toutes les colonnes critiques remplies</div><div class="value">' + totalRows + ' transactions, ' + distinctIds + ' IDs uniques</div></div></div>';
  } else {
    html += '<div class="status-row">';
    findings.forEach(f => {
      html += '<div class="status-pill ' + f.level + '"><div class="icon">' + (f.level === 'bad' ? '⚠' : '!') + '</div><div class="body"><div class="label">Anomalie</div><div class="value">' + f.msg + '</div></div></div>';
    });
    html += '</div>';
  }
  html += '</div>';

  // Récupérabilité
  let syncStatus = 'ok', syncMsg = 'Sync récente';
  if (hoursSinceLast == null) { syncStatus = 'warn'; syncMsg = 'Aucune sync enregistrée'; }
  else if (hoursSinceLast > 72) { syncStatus = 'bad'; syncMsg = 'Aucune sync depuis plus de 3 jours'; }
  else if (hoursSinceLast > 36) { syncStatus = 'warn'; syncMsg = 'Sync ancienne (> 36h)'; }

  html += '<div class="section"><div class="section-title">Récupérabilité comptable</div><div class="status-row">';
  html += '<div class="status-pill ' + syncStatus + '"><div class="icon">' + (syncStatus==='ok'?'✓':syncStatus==='warn'?'!':'⚠') + '</div><div class="body"><div class="label">Dernière sync cloud</div><div class="value">' + (hoursSinceLast == null ? '—' : hoursSinceLast < 1 ? Math.round(hoursSinceLast*60)+' min' : hoursSinceLast < 48 ? hoursSinceLast.toFixed(1)+' h' : (hoursSinceLast/24).toFixed(1)+' j') + '</div></div></div>';
  html += '<div class="status-pill ok"><div class="icon">📅</div><div class="body"><div class="label">Historique disponible</div><div class="value">' + (daysSinceFirst != null ? Math.round(daysSinceFirst) + ' j' : '—') + '</div></div></div>';
  html += '<div class="status-pill ok"><div class="icon">📊</div><div class="body"><div class="label">Lignes prêtes à exporter</div><div class="value">' + totalRows + '</div></div></div>';
  html += '</div>';
  html += '<p style="font-size:12px;color:var(--gray);margin-top:8px;">' + syncMsg + '. Pour les backups Supabase eux-mêmes (Point-In-Time Recovery, snapshots quotidiens), va dans <strong>Supabase Dashboard → Database → Backups</strong>.</p>';
  html += '</div>';

  // Pour aller plus loin
  html += '<div class="section"><div class="section-title">Détail avancé (advisors, policies)</div>';
  html += '<div class="status-pill ok"><div class="icon">🔍</div><div class="body"><div class="label">Diagnostic complet</div><div class="value">L\'artifact "Natura Tif diagnostic Supabase" dans Cowork affiche les advisors security/performance, l\'état RLS table par table et les politiques.</div></div></div>';
  html += '</div>';

  // Actions
  html += '<div class="section"><div class="actions">';
  html += '<button class="btn btn-outline" onclick="renderSecurity()">↻ Refaire les tests</button>';
  html += '<button class="btn btn-outline" onclick="loadData().then(render)">↻ Recharger les données</button>';
  html += '</div></div>';

  el.innerHTML = html;
}

// ==================== BACKUP ====================
function fmtBytes(b) {
  if (b == null) return '—';
  if (b < 1024) return b + ' B';
  if (b < 1024 * 1024) return (b / 1024).toFixed(1) + ' kB';
  return (b / (1024 * 1024)).toFixed(2) + ' MB';
}

  html += '<div class="section"><div class="section-title">Backups Supabase natifs (en plus)</div>';
  html += '<div class="status-pill ok"><div class="icon">☁️</div><div class="body"><div class="label">Supabase Daily Backup</div><div class="value">Le plan gratuit Supabase fait son propre backup quotidien (rétention 7 j). À consulter dans <strong>Supabase Dashboard → Database → Backups</strong>. Le backup local ici est un filet de sécurité supplémentaire que tu contrôles.</div></div>';
  html += '</div>';

  el.innerHTML = html;
}

async function triggerBackup(table) {
  const btn = document.getElementById('btn-snap');
  const out = document.getElementById('backup-result');
  if (btn) { btn.disabled = true; btn.textContent = 'Snapshot en cours…'; }
  out.innerHTML = '<div class="status-pill ok"><div class="icon">⏳</div><div class="body"><div class="label">En cours</div><div class="value">Connexion à Supabase et écriture du fichier…</div></div></div>';

  try {
    const r = await fetch('/api/backup', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ table: table, retention: 90 })
    });
    const data = await r.json();
    if (!r.ok || !data.ok) throw new Error(data.error || data.stderr || 'erreur inconnue');
    out.innerHTML = '<div class="status-pill ok"><div class="icon">✓</div><div class="body"><div class="label">Snapshot créé</div><div class="value">' + data.snapshot + ' · ' + data.rows + ' lignes · ' + fmtBytes(data.size_bytes) + (data.deleted_old && data.deleted_old.length ? ' · ' + data.deleted_old.length + ' anciens supprimés' : '') + '</div></div></div>';
    setTimeout(() => renderBackup(), 1500);
  } catch(e) {
    out.innerHTML = '<div class="status-pill bad"><div class="icon">⚠</div><div class="body"><div class="label">Échec</div><div class="value">' + e.message + '</div></div></div>';
    if (btn) { btn.disabled = false; btn.textContent = '📸 Snapshot ' + table + ' maintenant'; }
  }
}

// ==================== DEPLOY ====================
async function renderDeploy() {
  const el = document.getElementById('content');

  if (!IS_TEST) {
    // Mode prod : pas de backend → instructions
    el.innerHTML = '<div class="section"><div class="status-pill warn"><div class="icon">!</div><div class="body"><div class="label">Mode prod (GitHub Pages)</div><div class="value">Le déploiement nécessite le serveur Python local.</div></div></div></div>'
      + '<div class="section"><div class="section-title">Comment déployer</div>'
      + '<ol style="line-height:1.8;font-size:14px;color:var(--text);padding-left:20px;">'
      + '<li>Sur ton PC, lance <span style="font-family:monospace;background:var(--primary-light);padding:2px 6px;border-radius:4px;">start_server.bat</span></li>'
      + '<li>Ouvre <span style="font-family:monospace;background:var(--primary-light);padding:2px 6px;border-radius:4px;">http://localhost:8766/cockpit.html</span> et reviens ici</li>'
      + '<li>OU lance directement <span style="font-family:monospace;background:var(--primary-light);padding:2px 6px;border-radius:4px;">python scripts/deploy.py -m "ton message"</span></li>'
      + '</ol></div>';
    return;
  }

  el.innerHTML = '<div class="loading"><div class="spinner"></div><br>Pre-deploy checks…</div>';

  // Pre-deploy checks via /api/predeploy
  let predeployData = null, predeployError = null;
  try {
    const r = await fetch('/api/predeploy');
    if (r.ok) predeployData = await r.json();
    else { const txt = await r.text(); predeployError = 'serveur a renvoyé ' + r.status + ' : ' + txt.slice(0, 200); }
  } catch(e) { predeployError = e.message; }

  let html = '';

  if (predeployError) {
    html += '<div class="section"><div class="status-pill bad"><div class="icon">⚠</div><div class="body"><div class="label">Pre-deploy checks impossibles</div><div class="value">' + predeployError + '</div></div></div></div>';
    el.innerHTML = html;
    return;
  }

  const checks = predeployData && (predeployData.all_checks || []);
  const failed = checks.filter(c => !c.ok);
  const passed = checks.filter(c => c.ok);
  const verdict = failed.length === 0 ? 'ok' : 'bad';

  // Verdict
  html += '<div class="section"><div class="status-pill ' + verdict + '">'
       + '<div class="icon" style="font-size:24px">' + (verdict==='ok'?'✓':'⚠') + '</div>'
       + '<div class="body"><div class="label">Pre-deploy checks</div>'
       + '<div class="value" style="font-size:18px">' + (verdict==='ok' ? passed.length + ' checks passés' : failed.length + ' check(s) en échec — déploiement bloqué') + '</div></div></div></div>';

  // Liste des checks
  html += '<div class="section"><div class="section-title">Détail des vérifications</div><div class="status-row">';
  checks.forEach(c => {
    const cls = c.ok ? 'ok' : 'bad';
    const icon = c.ok ? '✓' : '⚠';
    const detail = c.ok ? (c.detail || '') : (c.reason || '?');
    html += '<div class="status-pill ' + cls + '"><div class="icon">' + icon + '</div><div class="body"><div class="label">' + c.name + '</div><div class="value">' + detail + '</div></div></div>';
  });
  html += '</div></div>';

  // Fichiers à déployer (si check diff vs remote a réussi)
  const diffCheck = checks.find(c => c.name === 'Diff vs remote');
  if (diffCheck && diffCheck.changed_files) {
    html += '<div class="section"><div class="section-title">Fichiers à déployer (' + diffCheck.changed_files.length + ')</div>';
    if (diffCheck.changed_files.length === 0) {
      html += '<div class="no-data">Rien à déployer (le local est aligné avec le remote).</div>';
    } else {
      html += '<div class="table-card" style="padding:12px;font-family:monospace;font-size:13px;">';
      html += diffCheck.changed_files.map(f => '<div>• ' + f + '</div>').join('');
      html += '</div>';
      if (diffCheck.asset_changed) {
        html += '<p style="font-size:12px;color:var(--gray);margin-top:8px;">⚠ Au moins un asset a changé → <strong>sw.js sera bumpé automatiquement</strong> avant le push.</p>';
      }
    }
    html += '</div>';
  }

  // Formulaire de déploiement
  const canDeploy = failed.length === 0 && diffCheck && diffCheck.changed_files && diffCheck.changed_files.length > 0;
  html += '<div class="section"><div class="section-title">Lancer le déploiement</div>';
  html += '<input type="text" id="deploy-msg" placeholder="Ex: ajout du contrôle matinal" style="width:100%;padding:12px 14px;border:2px solid var(--border);border-radius:10px;font-size:14px;font-family:Inter,sans-serif;outline:none;margin-bottom:10px;" />';
  html += '<div id="deploy-result" style="margin-bottom:10px;"></div>';
  html += '<div class="actions">';
  if (canDeploy) {
    html += '<button class="btn btn-primary" id="btn-deploy" onclick="triggerDeploy(false)">🚀 Déployer en prod</button>';
  } else {
    html += '<button class="btn btn-outline" disabled style="opacity:0.5;cursor:not-allowed">🚀 Déploiement bloqué</button>';
  }
  html += '<button class="btn btn-outline" onclick="renderDeploy()">↻ Refaire les checks</button>';
  if (failed.length > 0) {
    html += '<button class="btn btn-outline" onclick="triggerDeploy(true)" style="border-color:var(--red);color:var(--red);">⚠ Forcer (déconseillé)</button>';
  }
  html += '</div>';
  if (failed.length > 0) {
    html += '<p style="font-size:12px;color:var(--red);margin-top:8px;">Les checks rouges signalent un risque pour Gaëlle (RLS cassée, app sans signInAnonymously, etc.). Forcer = casser potentiellement la prod.</p>';
  }
  html += '</div>';

  // URL prod
  html += '<div class="section"><div class="section-title">Prod</div>';
  html += '<div class="status-pill ok"><div class="icon">🌐</div><div class="body"><div class="label">URL publique</div><div class="value"><a href="https://oxen19430.github.io/natura-tif/" target="_blank" style="color:var(--primary);">https://oxen19430.github.io/natura-tif/</a></div></div></div>';
  html += '</div>';

  el.innerHTML = html;
}

async function triggerDeploy(force) {
  const btn = document.getElementById('btn-deploy');
  const out = document.getElementById('deploy-result');
  const msg = (document.getElementById('deploy-msg').value || '').trim();
  if (!msg) {
    out.innerHTML = '<div class="status-pill warn"><div class="icon">!</div><div class="body"><div class="label">Message requis</div><div class="value">Décris en une phrase ce que ce déploiement apporte.</div></div></div>';
    return;
  }
  if (btn) { btn.disabled = true; btn.textContent = 'Déploiement en cours…'; }
  out.innerHTML = '<div class="status-pill ok"><div class="icon">⏳</div><div class="body"><div class="label">En cours</div><div class="value">Bump sw.js, clone, copy, commit, push…</div></div></div>';

  try {
    const r = await fetch('/api/deploy', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: msg, force: force })
    });
    const data = await r.json();
    if (!r.ok || !data.ok) throw new Error((data.error || data.step || 'erreur inconnue') + (data.failed ? ' : ' + data.failed.map(c => c.name).join(', ') : ''));
    out.innerHTML = '<div class="status-pill ok"><div class="icon">✓</div><div class="body"><div class="label">Déployé · commit ' + (data.commit_hash || '?') + '</div><div class="value">sw.js v' + (data.sw_version || '?') + (data.asset_bumped ? ' (auto-bump)' : '') + ' · ' + (data.changed_files ? data.changed_files.length : '?') + ' fichier(s) · GitHub Pages déploiera dans 30-60 s</div></div></div>';
    setTimeout(() => renderDeploy(), 3000);
  } catch(e) {
    out.innerHTML = '<div class="status-pill bad"><div class="icon">⚠</div><div class="body"><div class="label">Échec</div><div class="value">' + e.message + '</div></div></div>';
    if (btn) { btn.disabled = false; btn.textContent = '🚀 Déployer en prod'; }
  }
}

// ==================== TABLE ====================
function buildTable(txs) {
  const groups = [], seen = {};
  const sorted = [...txs].sort((a, b) => (a.date + (a.heure||'')).localeCompare(b.date + (b.heure||'')));
  sorted.forEach(t => {
    const k = t.session_id || t.id;
    if (!seen[k]) { seen[k] = { txs: [t], key: k }; groups.push(seen[k]); }
    else seen[k].txs.push(t);
  });

  let html = '<div class="table-card"><table><thead><tr><th>Date</th><th>Heure</th><th>Cat.</th><th>Détail</th><th>Total</th><th>Paiem.</th></tr></thead><tbody>';
  groups.forEach(g => {
    const f = g.txs[0];
    const total = g.txs.reduce((s, t) => s + t.montant, 0);
    const prestas = g.txs.filter(t => t.type !== 'produit').map(t => t.prestation);
    const prods = g.txs.filter(t => t.type === 'produit').map(t => t.prestation);
    let detail = prestas.join(', ');
    if (prods.length) detail += (detail ? ' + ' : '') + '<i>' + prods.join(', ') + '</i>';
    const payClass = f.paiement === 'especes' ? 'esp' : f.paiement === 'cb' ? 'cb' : 'cheque';
    html += `<tr><td>${f.date.split('-').reverse().join('/')}</td><td>${f.heure || ''}</td><td>${CAT_LABELS[f.categorie] || f.categorie}</td><td>${detail}</td><td><strong>${money(total)}</strong></td><td><span class="badge ${payClass}">${PAY_LABELS[f.paiement] || f.paiement}</span></td></tr>`;
  });
  html += '</tbody></table></div>';
  return html;
}

// ==================== CHARTS ====================
function buildCharts(txs, start, end) {
  if (chartBar) { chartBar.destroy(); chartBar = null; }
  if (chartPie) { chartPie.destroy(); chartPie = null; }

  const barData = getBarData(txs, start, end);
  const barCtx = document.getElementById('chart-bar');
  if (barCtx) {
    chartBar = new Chart(barCtx, {
      type: 'bar',
      data: {
        labels: barData.labels,
        datasets: [{
          label: 'CA', data: barData.values,
          backgroundColor: '#7A9B2E88', borderColor: '#7A9B2E', borderWidth: 1, borderRadius: 4
        }]
      },
      options: {
        responsive: true,
        plugins: { legend: { display: false } },
        scales: {
          y: { beginAtZero: true, ticks: { callback: v => v + ' €' } },
          x: { ticks: { maxRotation: 45 } }
        }
      }
    });
  }

  const catData = {};
  txs.forEach(t => {
    const key = t.type === 'produit' ? 'produit' : (t.categorie || 'autre');
    catData[key] = (catData[key] || 0) + t.montant;
  });
  const pieLabels = Object.keys(catData).map(k => k === 'produit' ? 'Produits' : (CAT_LABELS[k] || k));
  const pieValues = Object.values(catData);
  const pieColors = Object.keys(catData).map(k => COLORS[k] || '#ccc');

  const pieCtx = document.getElementById('chart-pie');
  if (pieCtx && pieValues.some(v => v > 0)) {
    chartPie = new Chart(pieCtx, {
      type: 'doughnut',
      data: { labels: pieLabels, datasets: [{ data: pieValues, backgroundColor: pieColors, borderWidth: 2, borderColor: '#fff' }] },
      options: { responsive: true, plugins: { legend: { position: 'bottom', labels: { padding: 12, font: { size: 12 } } } } }
    });
  }
}

function getBarData(txs, start, end) {
  const labels = [], values = [];
  if (currentPeriod === 'jour') {
    const byHour = {};
    txs.forEach(t => { const h = (t.heure || '00:00').split(':')[0]; byHour[h] = (byHour[h] || 0) + t.montant; });
    for (let h = 7; h <= 20; h++) { const k = String(h).padStart(2, '0'); labels.push(k + 'h'); values.push(byHour[k] || 0); }
  } else if (currentPeriod === 'semaine') {
    const dayNames = ['Lun', 'Mar', 'Mer', 'Jeu', 'Ven', 'Sam', 'Dim'];
    const byDay = {};
    txs.forEach(t => { const d = new Date(t.date); const dow = (d.getDay() + 6) % 7; byDay[dow] = (byDay[dow] || 0) + t.montant; });
    for (let i = 0; i < 7; i++) { labels.push(dayNames[i]); values.push(byDay[i] || 0); }
  } else if (currentPeriod === 'mois') {
    const byDay = {};
    txs.forEach(t => { const d = parseInt(t.date.split('-')[2]); byDay[d] = (byDay[d] || 0) + t.montant; });
    const lastDay = parseInt(end.split('-')[2]);
    for (let d = 1; d <= lastDay; d++) { labels.push(d); values.push(byDay[d] || 0); }
  } else {
    const byMonth = {};
    txs.forEach(t => { const m = parseInt(t.date.split('-')[1]) - 1; byMonth[m] = (byMonth[m] || 0) + t.montant; });
    for (let m = 0; m < 12; m++) { labels.push(MOIS_SHORT[m]); values.push(byMonth[m] || 0); }
  }
  return { labels, values };
}

// ==================== CSV EXPORT ====================
function downloadCSV() {
  const { start, end } = getRange();
  const txs = allTx.filter(t => t.date >= start && t.date <= end);
  generateCSV(txs, 'natura-tif_' + start + '_' + end + '.csv');
}
function downloadCSVAll() { generateCSV(allTx, 'natura-tif_complet.csv'); }

function generateCSV(txs, filename) {
  const header = 'Date;Heure;Catégorie;Type;Désignation;Montant;Paiement;Session ID\n';
  const rows = txs.map(t =>
    [t.date, t.heure || '', CAT_LABELS[t.categorie] || t.categorie, t.type || 'prestation', '"' + (t.prestation || '').replace(/"/g, '""') + '"', String(t.montant).replace('.', ','), PAY_LABELS[t.paiement] || t.paiement, t.session_id || ''].join(';')
  ).join('\n');
  const bom = '﻿';
  const blob = new Blob([bom + header + rows], { type: 'text/csv;charset=utf-8;' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
}

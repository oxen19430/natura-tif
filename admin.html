<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Natura Tif — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
:root {
  --primary: #5B5723;
  --primary-light: #F5F0E1;
  --green: #7A9B2E;
  --green-light: #EAF0D5;
  --red: #B94A3E;
  --gray: #888;
  --bg: #FAF8F2;
  --card: #FFFFFF;
  --text: #2D2A1E;
  --border: #E8E2D0;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* Login screen */
.login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
.login-card { background: var(--card); border-radius: 20px; padding: 40px 30px; max-width: 380px; width: 100%; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
.login-card h1 { font-family: 'Playfair Display', serif; color: var(--primary); font-size: 28px; margin-bottom: 6px; }
.login-card p { color: var(--gray); font-size: 14px; margin-bottom: 30px; }
.login-card input { width: 100%; padding: 14px 16px; border: 2px solid var(--border); border-radius: 12px; font-size: 16px; font-family: 'Inter', sans-serif; text-align: center; letter-spacing: 4px; outline: none; transition: border-color 0.2s; }
.login-card input:focus { border-color: var(--primary); }
.login-card button { width: 100%; margin-top: 16px; padding: 14px; background: var(--primary); color: #fff; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; font-family: 'Inter', sans-serif; cursor: pointer; }
.login-card button:hover { opacity: 0.9; }
.login-error { color: var(--red); font-size: 13px; margin-top: 12px; min-height: 18px; }

/* Dashboard */
.dashboard { display: none; max-width: 900px; margin: 0 auto; padding: 20px 16px 40px; }
.dash-header { text-align: center; padding: 20px 0 10px; }
.dash-header h1 { font-family: 'Playfair Display', serif; color: var(--primary); font-size: 26px; }
.dash-header p { color: var(--gray); font-size: 13px; margin-top: 4px; }
.dash-header .logout { position: absolute; top: 16px; right: 16px; background: none; border: 1px solid var(--border); border-radius: 8px; padding: 6px 12px; font-size: 12px; color: var(--gray); cursor: pointer; font-family: 'Inter', sans-serif; }

/* Tabs */
.tabs { display: flex; gap: 0; background: var(--card); border-radius: 12px; overflow: hidden; border: 2px solid var(--border); margin: 16px 0; }
.tab { flex: 1; padding: 12px 8px; text-align: center; font-size: 14px; font-weight: 600; cursor: pointer; background: transparent; border: none; color: var(--gray); font-family: 'Inter', sans-serif; transition: all 0.2s; }
.tab.active { background: var(--primary); color: #fff; }

/* Navigation */
.nav-row { display: flex; align-items: center; justify-content: center; gap: 12px; margin: 12px 0 20px; }
.nav-btn { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--border); background: var(--card); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--primary); }
.nav-label { font-size: 16px; font-weight: 600; color: var(--primary); min-width: 220px; text-align: center; }

/* Stats grid */
.stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 20px; }
.stat-card { background: var(--card); border-radius: 14px; padding: 16px; text-align: center; border: 1px solid var(--border); }
.stat-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--gray); margin-bottom: 6px; }
.stat-value { font-size: 24px; font-weight: 700; color: var(--primary); }
.stat-card.total { grid-column: 1 / -1; background: var(--primary); border-color: var(--primary); }
.stat-card.total .stat-label { color: rgba(255,255,255,0.7); }
.stat-card.total .stat-value { color: #fff; font-size: 32px; }

/* Table */
.tx-table-wrap { background: var(--card); border-radius: 14px; border: 1px solid var(--border); overflow: hidden; margin-bottom: 20px; }
.tx-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.tx-table th { background: var(--primary-light); color: var(--primary); font-weight: 700; text-transform: uppercase; font-size: 11px; letter-spacing: 0.5px; padding: 12px 10px; text-align: left; }
.tx-table td { padding: 10px; border-top: 1px solid var(--border); }
.tx-table tr:hover td { background: var(--primary-light); }
.tx-badge { display: inline-block; padding: 2px 8px; border-radius: 6px; font-size: 11px; font-weight: 600; }
.tx-badge.esp { background: #FEF3C7; color: #92400E; }
.tx-badge.cb { background: #DBEAFE; color: #1E40AF; }
.tx-badge.cheque { background: #E0E7FF; color: #3730A3; }
.tx-badge.produit { background: #FED7AA; color: #9A3412; }
.tx-badge.ferme { background: #FEE2E2; color: var(--red); }
.no-data { text-align: center; padding: 40px 20px; color: var(--gray); font-size: 14px; }

/* Fermeture row */
.ferme-row td { background: #FEF2F2 !important; color: var(--red); font-style: italic; }

/* Responsive */
@media (max-width: 600px) {
  .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
  .tx-table { font-size: 12px; }
  .tx-table th, .tx-table td { padding: 8px 6px; }
  .nav-label { font-size: 14px; min-width: 180px; }
}

/* Loading */
.loading { text-align: center; padding: 40px; color: var(--gray); }
.spinner { display: inline-block; width: 24px; height: 24px; border: 3px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 8px; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="test-banner" style="display:none;background:repeating-linear-gradient(45deg,#c0392b,#c0392b 14px,#a93226 14px,#a93226 28px);color:#fff;font:700 12px 'Inter',sans-serif;text-align:center;padding:6px;letter-spacing:0.5px;text-transform:uppercase;position:fixed;top:0;left:0;right:0;z-index:9999;">⚠ MODE TEST · table transactions_test</div>
<script>if(location.hostname==='localhost'||location.hostname==='127.0.0.1'){document.getElementById('test-banner').style.display='block';document.body.style.paddingTop='28px';}</script>

<!-- LOGIN -->
<div class="login-screen" id="login-screen">
  <div class="login-card">
    <h1>Natura Tif</h1>
    <p>Espace administration</p>
    <input type="password" id="pin-input" placeholder="Code PIN" maxlength="6" inputmode="numeric" autofocus>
    <button onclick="tryLogin()">ACCÉDER</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard">
  <button class="logout" onclick="logout()">Déconnexion</button>
  <div class="dash-header">
    <h1>Natura Tif</h1>
    <p>Tableau de bord</p>
  </div>

  <div class="tabs" id="period-tabs">
    <button class="tab active" onclick="setPeriod('jour')">Jour</button>
    <button class="tab" onclick="setPeriod('semaine')">Semaine</button>
    <button class="tab" onclick="setPeriod('mois')">Mois</button>
    <button class="tab" onclick="setPeriod('annee')">Année</button>
  </div>

  <div class="nav-row">
    <button class="nav-btn" onclick="navigate(-1)">‹</button>
    <div class="nav-label" id="nav-label">—</div>
    <button class="nav-btn" onclick="navigate(1)">›</button>
  </div>

  <div id="content">
    <div class="loading"><div class="spinner"></div><br>Chargement…</div>
  </div>
</div>

<script>
// ==================== CONFIG ====================
const SUPABASE_URL = 'https://rgwsqufbdimryxqefvhx.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJnd3NxdWZiZGltcnl4cWVmdmh4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NTI4OTQsImV4cCI6MjA5MDUyODg5NH0.VNIY3iq3WZz-SVveQdMMqNth2ZmBP7aoJJ3PhfsmN-0';
const PIN_CODE = '1234';

const JOURS = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
const MOIS = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
const CAT_LABELS = { femme: 'Femme', homme: 'Homme', enfant: 'Enfant' };
const PAY_LABELS = { especes: 'Espèces', cb: 'CB', cheque: 'Chèque' };

const IS_TEST = (location.hostname === 'localhost' || location.hostname === '127.0.0.1');
const TX_TABLE = IS_TEST ? 'transactions_test' : 'transactions';

let sb = null;
let currentPeriod = 'jour';
let currentDate = new Date();
let allTransactions = [];

// ==================== LOGIN ====================
document.getElementById('pin-input').addEventListener('keydown', e => { if (e.key === 'Enter') tryLogin(); });

function tryLogin() {
  const pin = document.getElementById('pin-input').value;
  if (pin === PIN_CODE) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    sessionStorage.setItem('nt_admin', '1');
    initDashboard();
  } else {
    document.getElementById('login-error').textContent = 'Code incorrect';
    document.getElementById('pin-input').value = '';
  }
}

function logout() {
  sessionStorage.removeItem('nt_admin');
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('pin-input').value = '';
  document.getElementById('login-error').textContent = '';
}

// Auto-login if session active
if (sessionStorage.getItem('nt_admin')) {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  initDashboard();
}

// ==================== DASHBOARD ====================
async function initDashboard() {
  sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  try { await sb.auth.signInAnonymously(); } catch(e) { console.warn('Auth anonyme:', e); }
  await loadTransactions();
  render();
}

async function loadTransactions() {
  try {
    const { data, error } = await sb.from(TX_TABLE).select('*').order('date', { ascending: false });
    if (error) throw error;
    allTransactions = data || [];
  } catch(e) {
    document.getElementById('content').innerHTML = '<div class="no-data">Erreur de connexion à Supabase.<br><small>' + e.message + '</small></div>';
  }
}

// ==================== PERIOD / NAVIGATION ====================
function setPeriod(p) {
  currentPeriod = p;
  currentDate = new Date();
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`.tab[onclick="setPeriod('${p}')"]`).classList.add('active');
  render();
}

function navigate(dir) {
  const d = currentDate;
  if (currentPeriod === 'jour') d.setDate(d.getDate() + dir);
  else if (currentPeriod === 'semaine') d.setDate(d.getDate() + dir * 7);
  else if (currentPeriod === 'mois') d.setMonth(d.getMonth() + dir);
  else if (currentPeriod === 'annee') d.setFullYear(d.getFullYear() + dir);
  render();
}

function getDateRange() {
  const d = new Date(currentDate);
  let start, end, label;

  if (currentPeriod === 'jour') {
    start = fmt(d);
    end = start;
    label = JOURS[d.getDay()] + ' ' + d.getDate() + ' ' + MOIS[d.getMonth()] + ' ' + d.getFullYear();
  } else if (currentPeriod === 'semaine') {
    const day = d.getDay();
    const diff = d.getDate() - day + (day === 0 ? -6 : 1);
    const monday = new Date(d); monday.setDate(diff);
    const sunday = new Date(monday); sunday.setDate(monday.getDate() + 6);
    start = fmt(monday);
    end = fmt(sunday);
    label = monday.getDate() + ' ' + MOIS[monday.getMonth()] + ' — ' + sunday.getDate() + ' ' + MOIS[sunday.getMonth()] + ' ' + sunday.getFullYear();
  } else if (currentPeriod === 'mois') {
    const first = new Date(d.getFullYear(), d.getMonth(), 1);
    const last = new Date(d.getFullYear(), d.getMonth() + 1, 0);
    start = fmt(first);
    end = fmt(last);
    label = MOIS[d.getMonth()] + ' ' + d.getFullYear();
  } else {
    start = d.getFullYear() + '-01-01';
    end = d.getFullYear() + '-12-31';
    label = 'Année ' + d.getFullYear();
  }
  return { start, end, label };
}

function fmt(d) {
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function money(n) {
  return n.toFixed(2).replace('.', ',') + ' €';
}

// ==================== RENDER ====================
function render() {
  const { start, end, label } = getDateRange();
  document.getElementById('nav-label').textContent = label;

  const txs = allTransactions.filter(t => t.date >= start && t.date <= end);

  // Stats
  const totalCA = txs.reduce((s, t) => s + (parseFloat(t.montant) || 0), 0);
  const nbEncaiss = new Set(txs.map(t => t.session_id || t.id)).size;

  const byCat = { femme: 0, homme: 0, enfant: 0 };
  const byPay = { especes: 0, cb: 0, cheque: 0 };
  let totalProduits = 0;

  txs.forEach(t => {
    const m = parseFloat(t.montant) || 0;
    if (t.type === 'produit') {
      totalProduits += m;
    } else {
      if (byCat[t.categorie] !== undefined) byCat[t.categorie] += m;
    }
    if (byPay[t.paiement] !== undefined) byPay[t.paiement] += m;
  });

  let html = '<div class="stats-grid">';
  html += '<div class="stat-card total"><div class="stat-label">Chiffre d\'affaires</div><div class="stat-value">' + money(totalCA) + '</div></div>';
  html += '<div class="stat-card"><div class="stat-label">Encaissements</div><div class="stat-value">' + nbEncaiss + '</div></div>';

  if (totalProduits > 0) {
    html += '<div class="stat-card"><div class="stat-label">Produits</div><div class="stat-value">' + money(totalProduits) + '</div></div>';
  } else {
    html += '<div class="stat-card"><div class="stat-label">Moy. / encaiss.</div><div class="stat-value">' + (nbEncaiss > 0 ? money(totalCA / nbEncaiss) : '—') + '</div></div>';
  }

  html += '</div>';

  // Category + payment breakdown
  html += '<div class="stats-grid">';
  html += '<div class="stat-card"><div class="stat-label">Femme</div><div class="stat-value">' + money(byCat.femme) + '</div></div>';
  html += '<div class="stat-card"><div class="stat-label">Homme</div><div class="stat-value">' + money(byCat.homme) + '</div></div>';
  html += '<div class="stat-card"><div class="stat-label">Enfant</div><div class="stat-value">' + money(byCat.enfant) + '</div></div>';
  if (totalProduits > 0) {
    html += '<div class="stat-card"><div class="stat-label">Produits</div><div class="stat-value">' + money(totalProduits) + '</div></div>';
  }
  html += '</div>';

  html += '<div class="stats-grid">';
  html += '<div class="stat-card"><div class="stat-label">Espèces</div><div class="stat-value">' + money(byPay.especes) + '</div></div>';
  html += '<div class="stat-card"><div class="stat-label">CB</div><div class="stat-value">' + money(byPay.cb) + '</div></div>';
  html += '<div class="stat-card"><div class="stat-label">Chèque</div><div class="stat-value">' + money(byPay.cheque) + '</div></div>';
  html += '<div class="stat-card"><div class="stat-label">Moy. / encaiss.</div><div class="stat-value">' + (nbEncaiss > 0 ? money(totalCA / nbEncaiss) : '—') + '</div></div>';
  html += '</div>';

  // Transaction table
  if (txs.length > 0) {
    // Group by session_id
    const sessions = [];
    const seen = new Set();
    txs.sort((a, b) => (a.date + a.heure).localeCompare(b.date + b.heure));

    txs.forEach(t => {
      const key = t.session_id || t.id;
      if (!seen.has(key)) {
        seen.add(key);
        sessions.push({ key, items: [t] });
      } else {
        sessions.find(s => s.key === key).items.push(t);
      }
    });

    html += '<div class="tx-table-wrap"><table class="tx-table"><thead><tr>';
    html += '<th>Date</th><th>Heure</th><th>Cat.</th><th>Détail</th><th>Total</th><th>Paiem.</th>';
    html += '</tr></thead><tbody>';

    sessions.forEach(s => {
      const first = s.items[0];
      const total = s.items.reduce((sum, t) => sum + (parseFloat(t.montant) || 0), 0);
      const prestas = s.items.filter(t => t.type !== 'produit').map(t => t.prestation);
      const produits = s.items.filter(t => t.type === 'produit').map(t => t.prestation);
      let detail = prestas.join(', ');
      if (produits.length > 0) detail += (detail ? ' + ' : '') + produits.join(', ');

      const payClass = first.paiement === 'especes' ? 'esp' : first.paiement === 'cb' ? 'cb' : 'cheque';
      const payLabel = PAY_LABELS[first.paiement] || first.paiement;
      const catLabel = CAT_LABELS[first.categorie] || first.categorie;

      const dateDisplay = first.date.split('-').reverse().join('/');

      html += '<tr>';
      html += '<td>' + dateDisplay + '</td>';
      html += '<td>' + (first.heure || '') + '</td>';
      html += '<td>' + catLabel + '</td>';
      html += '<td>' + detail;
      if (s.items.length > 1) html += ' <small>(' + s.items.length + ')</small>';
      html += '</td>';
      html += '<td><strong>' + money(total) + '</strong></td>';
      html += '<td><span class="tx-badge ' + payClass + '">' + payLabel + '</span></td>';
      html += '</tr>';
    });

    html += '</tbody></table></div>';
  } else {
    html += '<div class="no-data">Aucune transaction sur cette période</div>';
  }

  // Refresh button
  html += '<div style="text-align:center;margin-top:16px;">';
  html += '<button onclick="refresh()" style="padding:10px 24px;background:var(--green);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:Inter,sans-serif;">↻ Actualiser les données</button>';
  html += '</div>';

  document.getElementById('content').innerHTML = html;
}

async function refresh() {
  document.getElementById('content').innerHTML = '<div class="loading"><div class="spinner"></div><br>Actualisation…</div>';
  await loadTransactions();
  render();
}
</script>
</body>
</html>
